<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>TOSCA - Seleziona Negozio</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 40px; background-color: #f7f7f7; }
    .container { max-width: 700px; margin: 0 auto; background: white; padding: 20px; border-radius: 6px; box-shadow: 0 2px 8px rgba(0,0,0,.08); }
    h1 { text-align: center; }
    .db-link { display: block; margin: 10px 0; padding: 12px; background: #007bff; color: white; text-decoration: none; border-radius: 4px; text-align: center; }
    .db-link:hover { background: #0056b3; }
    .empty { color: #666; text-align: center; margin-top: 20px; }
    .form-control, input, textarea {
  user-select: text !important;
  color: #212529 !important;
  caret-color: #212529 !important;
  cursor: text;
}
  </style>
</head>
<body>
  <div class="container">
    <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:12px;">
      <h1 style="margin:0;">TOSCA - Seleziona Negozio</h1>
      <a href="/owner-login"
         title="Setup Owner — accesso riservato"
         style="display:flex; align-items:center; justify-content:center;
                width:42px; height:42px; border-radius:8px; background:#eee;
                color:#555; text-decoration:none; font-size:1.35em;
                border:1px solid #d0d0d0; flex-shrink:0;"
         aria-label="Setup Owner">⚙</a>
    </div>
    <p>Scegli il negozio per accedere:</p>
    {% if db_links and db_links|length > 0 %}
      {% for link in db_links %}
      <div style="margin: 10px 0;">
        <a href="{{ link.url }}" class="db-link">{{ link.label }}</a>
      </div>
      {% endfor %}
    {% else %}
      <p class="empty">Nessun database configurato. Verifica il file .env.</p>
    {% endif %}
  </div>
</body>
</html>
